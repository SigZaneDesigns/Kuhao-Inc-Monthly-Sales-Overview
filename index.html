<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuha'o, Inc. Dashboard</title>
<style>
  :root {
    --bg: #fdf6e3;
    --card: #fffdf5;
    --text: #3a2e1a;
    --muted: #8a7a60;
    --border: #e0d0b8;
    --accent: #c07d08;
    --gold: #a06808;
    --negative: #c03020;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .pw-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px 36px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    max-width: 360px;
    width: 90%;
  }
  .pw-box h2 { font-size: 1.2rem; color: var(--text); margin-bottom: 6px; }
  .pw-box p { font-size: 0.82rem; color: var(--muted); margin-bottom: 20px; }
  .pw-input {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 0.95rem; outline: none;
    background: #fef6e8; color: var(--text);
    font-family: inherit; margin-bottom: 12px;
  }
  .pw-input:focus { border-color: var(--accent); }
  .pw-btn {
    width: 100%; padding: 10px; border: none; border-radius: 8px;
    background: var(--accent); color: #fff;
    font-size: 0.9rem; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .pw-btn:hover { background: var(--gold); }
  .pw-error { color: var(--negative); font-size: 0.78rem; margin-top: 8px; display: none; }
  .pw-spinner {
    display: none; margin-top: 12px;
    font-size: 0.8rem; color: var(--muted);
  }
</style>
</head>
<body>
<div class="pw-box">
  <h2>Kuha&#39;o, Inc.</h2>
  <p>Enter password to view dashboard</p>
  <input type="password" class="pw-input" id="pw" placeholder="Password" autofocus>
  <button class="pw-btn" id="btn" onclick="decrypt()">Enter</button>
  <div class="pw-error" id="err">Incorrect password</div>
  <div class="pw-spinner" id="spin">Decrypting...</div>
</div>

function b64(s){var b=atob(s),a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a}
async function decrypt(){
  var pw=document.getElementById("pw").value;
  if(!pw)return;
  document.getElementById("err").style.display="none";
  document.getElementById("spin").style.display="block";
  document.getElementById("btn").disabled=true;
  try{
    var enc=new TextEncoder();
    var keyMaterial=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
    var key=await crypto.subtle.deriveKey(
      {name:"PBKDF2",salt:b64(SALT),iterations:600000,hash:"SHA-256"},
      keyMaterial,
      {name:"AES-GCM",length:256},
      false,
      ["decrypt"]
    );
    var plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(IV)},key,b64(CT));
    var html=new TextDecoder().decode(plain);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById("spin").style.display="none";
    document.getElementById("btn").disabled=false;
    document.getElementById("err").style.display="block";
    document.getElementById("pw").value="";
    document.getElementById("pw").focus();
  }
}
document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter")decrypt()});
</script>
